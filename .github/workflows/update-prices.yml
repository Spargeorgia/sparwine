name: Update Wine Prices

on:
  schedule:
    - cron: '0 21 * * *'   # 01:00 Tbilisi (UTC+4) — primary run
    - cron: '0 22 * * *'   # 02:00 Tbilisi (UTC+4) — retry if primary failed
  workflow_dispatch:        # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Install Playwright Chromium
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: Run price scraper
        working-directory: scripts
        run: node scrape-prices.js

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "chore: update wine prices $(date -u +%Y-%m-%d)"
          git push
